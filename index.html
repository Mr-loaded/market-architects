<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Market Architects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{background:#050A14;min-height:100%;font-family:'Inter','Segoe UI',sans-serif;color:#E8EDF5;}
    #root{max-width:480px;margin:0 auto;min-height:100vh;}
    input,button,textarea,select{font-family:inherit;}
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-track{background:#050A14;}
    ::-webkit-scrollbar-thumb{background:#1a2640;border-radius:2px;}
  </style>
</head>
<body>
  <div id="root">
    <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:#050A14;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,sans-serif;">
      <div style="font-size:48px;margin-bottom:16px;">🏛️</div>
      <div style="font-size:22px;font-weight:900;background:linear-gradient(45deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;">Market Architects</div>
      <div style="color:#4a6080;font-size:13px;">Loading...</div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
